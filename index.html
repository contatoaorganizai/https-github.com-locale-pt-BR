<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descomplicaí | Lista do Beta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8 md:p-10">
    <h1 class="text-4xl md:text-5xl font-extrabold text-blue-900 mb-4">
      Descomplicaí 📍
    </h1>

    <p class="text-gray-600 text-xl mb-8">
      O GPS que te diz quanto você pode gastar hoje.
    </p>

    <div class="space-y-4">
      <input
        type="email"
        id="email"
        placeholder="Seu e-mail"
        class="w-full rounded-2xl border border-gray-200 px-5 py-4 text-lg outline-none focus:border-blue-500"
      />

      <input
        type="text"
        id="whatsapp"
        placeholder="Seu WhatsApp"
        class="w-full rounded-2xl border border-gray-200 px-5 py-4 text-lg outline-none focus:border-blue-500"
      />

      <button
        type="button"
        onclick="enviarDados()"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold rounded-2xl py-4 text-lg transition"
      >
        Entrar na fila do Beta
      </button>
    </div>

    <p id="mensagem" class="mt-6 text-center text-green-600 font-semibold hidden">
      Você entrou na fila do beta 🚀
    </p>
  </div>

  <script>
    async function enviarDados() {
      const email = document.getElementById("email").value.trim();
      const whatsapp = document.getElementById("whatsapp").value.trim();
      const mensagem = document.getElementById("mensagem");

      if (!email || !whatsapp) {
        alert("Preencha seu e-mail e WhatsApp.");
        return;
      }

      try {
        await fetch("https://script.google.com/macros/s/AKfycbyqmekQ8U6MutzEtJBhQ0BL088UXXHMNhqylVLg9yhZq9l_vCwkJ5htnzBMOxWUZhpK3Q/exec", {
          method: "POST",
          body: JSON.stringify({
            email: email,
            whatsapp: whatsapp
          })
        });

        mensagem.classList.remove("hidden");
        document.getElementById("email").value = "";
        document.getElementById("whatsapp").value = "";
      } catch (erro) {
        alert("Não consegui enviar agora. Tente novamente.");
        console.error(erro);
      }
    }
  </script>

</body>
</html>
